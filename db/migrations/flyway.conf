# =============================================================================
# Flyway Configuration — FastFoodDelivery
# Database: PostgreSQL 15+
# =============================================================================

flyway.url=jdbc:postgresql://localhost:5432/fastfood
flyway.user=postgres
flyway.password=${DB_PASSWORD:-test123}
flyway.schemas=infra,auth,user,onboarding,menu,coverage,search,order,payment,dispatch,tracking,realtime,verification,rating,finance,promotion
flyway.locations=filesystem:docs/migrations
flyway.sql-migration-prefix=V
flyway.sql-migration-suffix=.sql
flyway.encoding=UTF-8
flyway.out-of-order=false
flyway.validate-on-migrate=true
flyway.clean-disabled=false

# =============================================================================
# Usage:
#   flyway -configFiles=docs/migrations/flyway.conf migrate   # Apply
#   flyway -configFiles=docs/migrations/flyway.conf info      # Check status
#   flyway -configFiles=docs/migrations/flyway.conf clean     # Drop all (dev only)
#   flyway -configFiles=docs/migrations/flyway.conf undo      # Rollback (Teams/Pro)
#
# Rollback via SQL (community edition):
#   psql -U postgres -d fastfood -f docs/migrations/rollback/V2__Clear_Seed_Data.sql
#   psql -U postgres -d fastfood -f docs/migrations/rollback/V1__Drop_All.sql
# =============================================================================
